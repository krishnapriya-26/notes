<!DOCTYPE html>
<html>
<head>
<title>Notes Hub</title>

<script>
// 🔥 LOGIN CHECK
if(!localStorage.getItem("loggedIn")){
  window.location.href = "login.html";
}
</script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;

  background: linear-gradient(rgba(245,246,250,0.9), rgba(245,246,250,0.9)),
              url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f');

  background-size: cover;
}

/* NAVBAR */
.navbar {
  background: #1e293b;
  color: white;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
}

/* SUBJECTS */
.subjects {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.subject-card {
  width: 250px;
  margin: 15px;
  padding: 20px;
  border-radius: 12px;
  color: white;
  cursor: pointer;
}

.ai { background:#4facfe; }
.crypto { background:#43e97b; }
.compiler { background:#fa709a; }

/* NOTES */
.notes {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: white;
  width: 250px;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
}

button {
  padding: 6px 10px;
  background: #1e293b;
  color: white;
  border: none;
}

.search-box {
  text-align: center;
  margin: 20px;
}
</style>
</head>

<body>

<div class="navbar">
  <h2>📚 Notes Hub</h2>
  <button onclick="logout()">Logout</button>
</div>

<!-- SUBJECTS -->
<div class="subjects">
  <div class="subject-card ai" onclick="filter('Artificial Intelligence')">AI</div>
  <div class="subject-card crypto" onclick="filter('Cryptography')">Crypto</div>
  <div class="subject-card compiler" onclick="filter('Compiler Design')">Compiler</div>
</div>

<div style="text-align:center;">
  <button onclick="loadAll()">⬅ Back</button>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input id="search" placeholder="Search..." onkeyup="searchNotes()">
</div>

<h2 style="text-align:center;">📚 Notes</h2>
<div class="notes" id="notes"></div>

<h2 style="text-align:center;">📌 Important Questions</h2>
<div class="notes" id="important"></div>

<script>
let allData=[];

/* LOAD */
function loadAll(){
 fetch("http://localhost:3000/notes") // ⚠️ change if deployed
 .then(res=>res.json())
 .then(data=>{
   allData=data;
   show("note","notes");
   show("important","important");
 });
}

/* DISPLAY */
function show(type,id){
 document.getElementById(id).innerHTML =
 allData.filter(n=>n.type===type).map(n=>`
   <div class="card">
     <h3>${n.title}</h3>
     <p>${n.subject}</p>
     <p>${n.description}</p>

     ${n.file ? `
       <button onclick="window.open('http://localhost:3000/uploads/${n.file}')">Open</button>
       <a href="http://localhost:3000/uploads/${n.file}" download>
         <button>Download</button>
       </a>
     `:""}
   </div>
 `).join("");
}

/* FILTER */
function filter(sub){
 notes.innerHTML = allData.filter(n=>n.subject===sub)
 .map(n=>`
   <div class="card">
     <h3>${n.title}</h3>
     <p>${n.description}</p>
   </div>
 `).join("");
}

/* SEARCH */
function searchNotes(){
 let t = search.value.toLowerCase();
 notes.innerHTML = allData.filter(n=>n.title.toLowerCase().includes(t))
 .map(n=>`
   <div class="card">
     <h3>${n.title}</h3>
     <p>${n.description}</p>
   </div>
 `).join("");
}

/* LOGOUT */
function logout(){
 localStorage.removeItem("loggedIn");
 window.location.href = "login.html";
}

loadAll();
</script>

</body>
</html>
