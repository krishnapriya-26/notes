<!DOCTYPE html>
<html>
<head>
<title>Notes Hub Login</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', sans-serif;

  /* 📚 Background Image */
  background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794') no-repeat center center/cover;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* Dark overlay */
.overlay {
  background: rgba(0,0,0,0.6);
  position: absolute;
  width: 100%;
  height: 100%;
}

/* Login Box */
.login-box {
  position: relative;
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  z-index: 2;
}

h2 {
  margin-bottom: 20px;
}

/* Inputs */
input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Buttons */
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #667eea;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #5a67d8;
}
</style>

</head>

<body>

<div class="overlay"></div>

<div class="login-box">
  <h2>📚 Notes Hub</h2>

  <input id="email" placeholder="Enter Email">
  <input id="password" type="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<script>
function login() {
 fetch("/login", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     email: email.value,
     password: password.value
   })
 })
 .then(res=>res.text())
 .then(msg=>{
   if(msg==="Success") {
     window.location.href = "/";
   } else {
     alert(msg);
   }
 });
}

function register() {
 fetch("/register", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     email: email.value,
     password: password.value
   })
 })
 .then(res=>res.text())
 .then(msg=>alert(msg));
}
</script>

</body>
</html>
